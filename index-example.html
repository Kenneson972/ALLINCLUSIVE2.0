<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhanelConcept - Exemple d'intégration Jamstack</title>
    
    <!-- CSS minimal pour exemple -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: monospace;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.1);
            color: #ff6b6b;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h3 {
            color: white;
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        
        .card p {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .price {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
            margin-top: 10px;
        }
        
        .category {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            display: inline-block;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }
        
        .config-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: white;
            font-family: monospace;
            font-size: 0.9em;
        }
        
        .filter-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .filter-section h3 {
            color: white;
            margin-bottom: 15px;
        }
        
        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group label {
            color: white;
            font-weight: 500;
        }
        
        .filter-group input, .filter-group select {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(5px);
        }
        
        .filter-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .filter-group select option {
            background: #333;
            color: white;
        }
        
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            
            .filter-group {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .filter-group input, .filter-group select {
                width: 100%;
            }
        }
    </style>
<style id="lg-inline">
:root{--lg-blur:26px;--lg-saturate:180%;--lg-tint:rgba(240,245,250,.12);--lg-chroma:.012;}
:is(.glass-card,.glass-light,.glass-medium,.glass-dark,.glass-nav,.glass-header,.glass-footer,.glass-modal,.glass-modal-content,.glass-dropdown,.glass-input,.glass-btn,.glass-search,.glass-table,.glass-tag){background:transparent!important;border:none!important;box-shadow:none!important;-webkit-backdrop-filter:none!important;backdrop-filter:none!important;}
:is(.glass-card,.glass-light,.glass-medium,.glass-dark,.glass-nav,.glass-header,.glass-footer,.glass-modal,.glass-modal-content,.glass-dropdown,.glass-input,.glass-btn,.glass-search,.glass-table,.glass-tag,.villa-card,.service-card,.btn-reserve-secondary,.filter-btn,.reward-tab,.filter-tab){background:linear-gradient(180deg,rgba(255,255,255,.18)0%,rgba(255,255,255,.08)100%),var(--lg-tint)!important;-webkit-backdrop-filter:blur(var(--lg-blur)) saturate(var(--lg-saturate))!important;backdrop-filter:blur(var(--lg-blur)) saturate(var(--lg-saturate))!important;border:1px solid rgba(255,255,255,.24)!important;border-radius:18px!important;box-shadow:0 10px 30px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.08)!important;position:relative;overflow:hidden;}

.lg-droplet{border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.16)0%,rgba(255,255,255,.06)100%),var(--lg-tint)!important;mask:url(#lgDropletMask);-webkit-mask-image:radial-gradient(120% 100% at 50% 45%,#000 65%,transparent 100%);-webkit-mask-composite:source-over;}

.lg-edge::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,.10)35%,rgba(0,0,0,.08)100%);mix-blend-mode:overlay;opacity:.55;}
.lg-chroma{box-shadow:0 0 0 1px rgba(255,0,80,var(--lg-chroma)),0 0 0 1px rgba(0,120,255,var(--lg-chroma)) inset;}
@media (prefers-reduced-motion:reduce){.lg-droplet::before{animation:none}}
</style>
</head>
<link rel="stylesheet" href="/assets/css/liquid-glass.patch.css">
<body>
    <div class="container">
        <h1>🏖️ KhanelConcept - Pré-backend Jamstack</h1>
        
        <!-- Configuration Info -->
        <div class="config-info">
            <strong>📊 Configuration API:</strong>
            <div id="config-display">Chargement...</div>
        </div>
        
        <!-- Status -->
        <div id="status" class="status">
            ⏳ Prêt - Cliquez sur un bouton pour tester l'API
        </div>
        
        <!-- Filtres pour villas -->
        <div class="filter-section">
            <h3>🔍 Filtres Villas</h3>
            <div class="filter-group">
                <label for="category-filter">Catégorie:</label>
                <select id="category-filter">
                    <option value="">Toutes</option>
                    <option value="sejour">Séjour</option>
                    <option value="fete">Fête</option>
                    <option value="speciale">Spéciale</option>
                </select>
                
                <label for="location-filter">Localisation:</label>
                <input type="text" id="location-filter" placeholder="Ex: Vauclin, Lamentin...">
                
                <label for="guests-filter">Invités min:</label>
                <input type="number" id="guests-filter" min="1" placeholder="6">
                
                <label for="price-max">Prix max:</label>
                <input type="number" id="price-max" min="0" placeholder="1500">
            </div>
        </div>
        
        <!-- Contrôles -->
        <div class="controls">
            <button onclick="loadVillas()">🏖️ Charger Villas</button>
            <button onclick="loadPrestataires()">🤝 Charger Prestataires</button>
            <button onclick="loadEvents()">🎉 Charger Événements</button>
            <button onclick="loadStats()">📊 Statistiques</button>
            <button onclick="checkHealth()">🏥 Santé API</button>
            <button onclick="clearCache()">🗑️ Vider Cache</button>
        </div>
        
        <!-- Résultats -->
        <div id="results"></div>
    </div>

    <!-- Module fetchData.js -->
    <script type="module">
        import {
            getVillas,
            getVillaById,
            getPrestataires,
            getEvents,
            getHealth,
            getStats,
            clearCache as clearApiCache,
            getApiConfig
        } from './fetchData.js';
        
        // Variables globales
        let currentData = [];
        
        // Affichage de la configuration
        function updateConfigDisplay() {
            const config = getApiConfig();
            document.getElementById('config-display').innerHTML = `
                <div>🌍 Environnement: <strong>${config.current}</strong></div>
                <div>🔗 Base URL: <strong>${config.current === 'development' ? config.development : config.production}</strong></div>
                <div>💾 Cache: ${config.cacheSize} éléments (${config.cacheDuration/1000/60}min TTL)</div>
            `;
        }
        
        // Fonction utilitaire pour afficher le statut
        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = isError ? 'status error' : 'status';
        }
        
        // Fonction utilitaire pour afficher les résultats
        function displayResults(data, title) {
            const resultsEl = document.getElementById('results');
            
            if (!data || data.length === 0) {
                resultsEl.innerHTML = `<div class="loading">Aucune donnée trouvée pour ${title}</div>`;
                return;
            }
            
            let html = `<h2 style="color: white; margin-bottom: 20px;">${title} (${data.length} résultats)</h2>`;
            
            if (Array.isArray(data)) {
                html += '<div class="grid">';
                data.forEach(item => {
                    html += createCard(item);
                });
                html += '</div>';
            } else {
                html += `<div class="card"><pre style="color: white; white-space: pre-wrap;">${JSON.stringify(data, null, 2)}</pre></div>`;
            }
            
            resultsEl.innerHTML = html;
        }
        
        // Créer une carte pour un élément
        function createCard(item) {
            if (item.name && item.price) {
                // Villa
                return `
                    <div class="card">
                        <h3>${item.name}</h3>
                        <p><strong>📍 Localisation:</strong> ${item.location}</p>
                        <p><strong>👥 Invités:</strong> ${item.guests_detail || item.guests}</p>
                        <p><strong>✨ Caractéristiques:</strong> ${item.features}</p>
                        <div class="price">${item.price}€</div>
                        <div class="category">${item.category}</div>
                    </div>
                `;
            } else if (item.title && item.date) {
                // Événement
                return `
                    <div class="card">
                        <h3>${item.title}</h3>
                        <p><strong>📅 Date:</strong> ${item.date} à ${item.time}</p>
                        <p><strong>📍 Lieu:</strong> ${item.location}</p>
                        <p>${item.description}</p>
                        <div class="price">${item.price}€</div>
                        <div class="category">${item.category}</div>
                        <p style="margin-top: 10px;"><strong>Places disponibles:</strong> ${item.available}/${item.capacity}</p>
                    </div>
                `;
            } else if (item.category && item.phone) {
                // Prestataire
                return `
                    <div class="card">
                        <h3>${item.name}</h3>
                        <p><strong>📍 Localisation:</strong> ${item.location}</p>
                        <p><strong>📞 Téléphone:</strong> ${item.phone}</p>
                        <p><strong>✉️ Email:</strong> ${item.email}</p>
                        <p>${item.description}</p>
                        <div class="price">${item.price_range}</div>
                        <div class="category">${item.category}</div>
                        <p style="margin-top: 10px;"><strong>Note:</strong> ⭐ ${item.rating}/5 ${item.verified ? '✅ Vérifié' : ''}</p>
                    </div>
                `;
            } else {
                // Générique
                return `
                    <div class="card">
                        <h3>${item.name || item.title || 'Élément'}</h3>
                        <pre style="color: rgba(255,255,255,0.8); font-size: 0.9em;">${JSON.stringify(item, null, 2)}</pre>
                    </div>
                `;
            }
        }
        
        // Fonctions exposées globalement
        window.loadVillas = async function() {
            try {
                showStatus('🔄 Chargement des villas...');
                
                // Récupération des filtres
                const filters = {};
                const category = document.getElementById('category-filter').value;
                const location = document.getElementById('location-filter').value;
                const guests = document.getElementById('guests-filter').value;
                const maxPrice = document.getElementById('price-max').value;
                
                if (category) filters.category = category;
                if (location) filters.location = location;
                if (guests) filters.guests = parseInt(guests);
                if (maxPrice) filters.max_price = parseFloat(maxPrice);
                
                const villas = await getVillas(filters);
                currentData = villas;
                
                showStatus(`✅ ${villas.length} villas chargées avec succès`);
                displayResults(villas, '🏖️ Villas');
                
            } catch (error) {
                showStatus(`❌ Erreur lors du chargement des villas: ${error.message}`, true);
                console.error('Erreur villas:', error);
            }
        };
        
        window.loadPrestataires = async function() {
            try {
                showStatus('🔄 Chargement des prestataires...');
                
                const prestataires = await getPrestataires();
                currentData = prestataires;
                
                showStatus(`✅ ${prestataires.length} prestataires chargés avec succès`);
                displayResults(prestataires, '🤝 Prestataires');
                
            } catch (error) {
                showStatus(`❌ Erreur lors du chargement des prestataires: ${error.message}`, true);
                console.error('Erreur prestataires:', error);
            }
        };
        
        window.loadEvents = async function() {
            try {
                showStatus('🔄 Chargement des événements...');
                
                const events = await getEvents({ available: true });
                currentData = events;
                
                showStatus(`✅ ${events.length} événements chargés avec succès`);
                displayResults(events, '🎉 Événements');
                
            } catch (error) {
                showStatus(`❌ Erreur lors du chargement des événements: ${error.message}`, true);
                console.error('Erreur événements:', error);
            }
        };
        
        window.loadStats = async function() {
            try {
                showStatus('🔄 Chargement des statistiques...');
                
                const stats = await getStats();
                
                showStatus('✅ Statistiques chargées avec succès');
                displayResults(stats, '📊 Statistiques');
                
            } catch (error) {
                showStatus(`❌ Erreur lors du chargement des statistiques: ${error.message}`, true);
                console.error('Erreur statistiques:', error);
            }
        };
        
        window.checkHealth = async function() {
            try {
                showStatus('🔄 Vérification de la santé de l\'API...');
                
                const health = await getHealth();
                
                showStatus('✅ API en bonne santé');
                displayResults(health, '🏥 Santé API');
                
            } catch (error) {
                showStatus(`❌ Erreur lors de la vérification: ${error.message}`, true);
                console.error('Erreur santé:', error);
            }
        };
        
        window.clearCache = function() {
            clearApiCache();
            showStatus('🗑️ Cache vidé avec succès');
            updateConfigDisplay();
        };
        
        // Initialisation
        updateConfigDisplay();
        
        // Mise à jour périodique de la config
        setInterval(updateConfigDisplay, 5000);
        
        console.log('✅ Interface de test Jamstack initialisée');
    </script>
</body>
<!-- Liquid Glass Refract SVG -->
<svg width="0" height="0" style="position:absolute">
  <filter id="lgRefract">
    <feTurbulence type="fractalNoise" baseFrequency="0.004" numOctaves="2" seed="5" result="n"/>
    <feGaussianBlur in="n" stdDeviation="7" result="s"/>
    <feDisplacementMap in="SourceGraphic" in2="s" scale="5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
</html>
